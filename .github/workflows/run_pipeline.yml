name: Run PQM KPI Pipeline

on:
  schedule:
    # Runs daily at 22:30 UTC = 04:00 IST (next day)
    - cron: "30 22 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python pipeline.py

      - name: Commit updated CSV outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add output/*.csv
          git commit -m "Auto-update KPI outputs" || echo "No changes to commit"
          git push
